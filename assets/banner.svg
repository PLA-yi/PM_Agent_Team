<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#27272A"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- 左侧 logo -->
  <g transform="translate(60, 60)">
    <rect width="160" height="160" rx="32" fill="#FF9500"/>
    <text x="80" y="105" text-anchor="middle"
          font-family="-apple-system, sans-serif" font-size="56" font-weight="700" fill="#18181B">PM</text>
  </g>

  <!-- 标题 + slogan -->
  <g transform="translate(260, 90)">
    <text font-family="-apple-system, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      PM Agent Team
    </text>
    <text y="40" font-family="-apple-system, sans-serif" font-size="22" font-weight="500" fill="url(#orange)">
      AI Product Manager · Multi-Agent Cluster
    </text>
    <text y="80" font-family="-apple-system, sans-serif" font-size="16" fill="#A1A1AA">
      让 PM 30 秒拿到原本 2 天的调研产出 — 竞品 / 访谈 / PRD / 社聆 一站式
    </text>
    <g transform="translate(0, 110)" font-family="-apple-system, sans-serif" font-size="13" font-weight="500">
      <rect width="80" height="28" rx="14" fill="#FF9500" fill-opacity="0.15" stroke="#FF9500"/>
      <text x="40" y="19" text-anchor="middle" fill="#FF9500">v0.4</text>

      <rect x="92" width="80" height="28" rx="14" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6"/>
      <text x="132" y="19" text-anchor="middle" fill="#60A5FA">Go + React</text>

      <rect x="184" width="100" height="28" rx="14" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E"/>
      <text x="234" y="19" text-anchor="middle" fill="#4ADE80">Claude 4.5</text>

      <rect x="296" width="100" height="28" rx="14" fill="#A78BFA" fill-opacity="0.15" stroke="#A78BFA"/>
      <text x="346" y="19" text-anchor="middle" fill="#C4B5FD">10 Agents</text>
    </g>
  </g>
</svg>
